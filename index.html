<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- MUST include user-scalable=yes to allow pinch-to-zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Removed overflow: hidden so users can scroll around when zoomed in */
        }

        .resizable-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fullscreen-img {
            width: 100vw;   
            height: 100vh;  
            object-fit: fill; /* Stretches the image to full viewport */
            
            /* Tells the mobile browser to allow standard touch gestures like pinching */
            touch-action: pinch-zoom; 
        }
    </style>
</head>
<body>

    <div class="resizable-container">
        <img src="TCVC.png" alt="Resizable Mobile Image" class="fullscreen-img">
    </div>

</body>
</html>
