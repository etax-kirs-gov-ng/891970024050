<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Critical for mobile screen scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <style>
        /* Remove default browser margins and scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        .fullscreen-img {
            width: 100vw;   /* 100% of the viewport width */
            height: 100vh;  /* 100% of the viewport height */
            
            /* CHOOSE ONE OF THE OPTIONS BELOW FOR THE IMAGE RATIO: */
            
            /* Option A: Force stretches the image to fit (unproportional/distorted) */
            /* object-fit: fill; 
            
            /* Option B (Recommended): Fills screen, crops edges to keep proportion */
            object-fit: cover
        }
    </style>
</head>
<body>

    <img src="TCVC.png" alt="Fullscreen Mobile Image" class="fullscreen-img">

</body>
</html>
